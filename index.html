<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>SFC Hub Locator</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="top-header">
    <div class="brand-wrap">
      <div class="brand-logo">SteadFast</div>
      <div class="brand-sub">Courier</div>
    </div>

    <div class="header-time" id="liveDateTime">Loading time...</div>

    <div class="header-search">
      <input id="searchBox" type="text" placeholder="Search Hub">
      <span class="search-icon">⌕</span>
    </div>
  </div>

  <div class="layout">
    <div class="sidebar">
      <div class="sidebar-title">Hub List</div>
      <div id="hubList"></div>
    </div>

    <div id="map"></div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
